<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>edyfi — Data &amp; Insight Platform</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --navy:#02043F; --blue:#2E3BED; --cobalt:#051FC2; --green:#036147; --lime:#CBE448;
  --mint:#63CC78; --amber:#FFB600; --orange:#FE7026; --red:#DD4356; --pink:#FF5AC3;
  --pink-l:#FFA5E5; --purple:#A150EF; --purple-d:#853199; --sky:#0087C1; --sky-l:#66CBFF;
  --lilac:#EEE4EF; --white:#fff;
  --bg:#EEF0FA; --card:#ffffff; --ink:#1A1D2E; --muted:#6B7194; --line:#E6E8F2;
  --report:var(--purple); --optimise:var(--sky); --automate:var(--orange);
  --shadow:0 2px 4px rgba(2,4,63,.04),0 8px 24px rgba(2,4,63,.07);
  --shadow-lg:0 8px 40px rgba(2,4,63,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

/* ---------- Layout ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:244px;background:var(--navy);color:#C9CBE4;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:40;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:6px}.sidebar::-webkit-scrollbar-thumb{background:#2a2c55;border-radius:3px}
.brand{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand{padding:20px 20px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand img.wm{width:108px;height:auto;display:block}
.brand .tag{font-size:9.5px;color:#7C82AE;letter-spacing:.6px;text-transform:uppercase;margin-top:7px}
.nav{padding:10px 0 20px;flex:1}
.nav-section{padding:14px 20px 6px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#6064A0;font-weight:700;display:flex;align-items:center;gap:7px}
.nav-section .jdot{width:8px;height:8px;border-radius:50%}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 20px;cursor:pointer;font-size:13.5px;color:#C9CBE4;border-left:3px solid transparent;transition:all .15s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(46,59,237,.22);color:#fff;border-left-color:var(--sky-l);font-weight:600}
.nav-item .ico{width:18px;height:18px;flex-shrink:0;opacity:.85}
.nav-item.soon{opacity:.55;cursor:default}
.nav-item.soon:hover{background:transparent;color:#C9CBE4}
.badge-soon{margin-left:auto;font-size:8.5px;background:rgba(255,182,0,.18);color:var(--amber);padding:2px 6px;border-radius:20px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.badge-count{margin-left:auto;font-size:10px;background:var(--red);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}

/* ---------- Main ---------- */
.main{flex:1;margin-left:244px;min-width:0}
.topbar{height:62px;background:var(--blue);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:30;gap:16px;box-shadow:0 2px 12px rgba(46,59,237,.18)}
.topbar h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
.topbar .crumb{font-size:10.5px;color:rgba(255,255,255,.7);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
.spacer{flex:1}
.search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:10px;padding:8px 12px;width:220px;color:rgba(255,255,255,.85);font-size:13px}
.search input{border:0;background:0;outline:0;font-family:inherit;font-size:13px;width:100%;color:#fff}
.search input::placeholder{color:rgba(255,255,255,.6)}
.tbtn{display:flex;align-items:center;gap:7px;background:var(--blue);color:#fff;border:0;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.tbtn:hover{background:var(--cobalt)}
.tbtn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
.tbtn.ghost:hover{border-color:var(--blue);color:var(--blue)}
.iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;position:relative}
.iconbtn:hover{background:rgba(255,255,255,.24)}

/* ---------- Stakeholder toggle ---------- */
.stk{display:flex;align-items:center;background:rgba(255,255,255,.16);border-radius:10px;padding:3px;gap:2px}
.stk button{border:0;background:0;padding:7px 13px;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:6px;transition:.15s}
.stk button.on{background:#fff;box-shadow:var(--shadow);color:var(--navy)}
.stk button .dot{width:7px;height:7px;border-radius:50%}
.stk button[data-stk="owner"] .dot{background:var(--purple)}
.stk button[data-stk="occupier"] .dot{background:var(--sky)}

/* ---------- Page ---------- */
.page{padding:24px 26px 60px;display:none}
.page.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pagehead{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.pagehead .ph-l{flex:1;min-width:240px}
.pagehead h2{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.4px}
.pagehead p{color:var(--muted);font-size:13.5px;margin-top:3px;max-width:680px}
.controls{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.pill-select{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer}
.pill-select select{border:0;background:0;outline:0;font-family:inherit;font-weight:600;color:var(--navy);font-size:13px;cursor:pointer}

/* journey ribbon */
.jbanner{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:5px 12px;border-radius:30px;margin-bottom:14px}
.jbanner .jdot{width:9px;height:9px;border-radius:50%}
.j-report{background:rgba(161,80,239,.12);color:var(--purple-d)}
.j-report .jdot{background:var(--purple)}
.j-optimise{background:rgba(0,135,193,.12);color:var(--sky)}
.j-optimise .jdot{background:var(--sky)}

/* ---------- Cards / KPIs ---------- */
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(184px,1fr));margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 16px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .kicon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:11px}
.kpi .klabel{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi .kval{font-size:25px;font-weight:800;color:var(--navy);margin-top:3px;letter-spacing:-.5px}
.kpi .kval small{font-size:14px;font-weight:700;color:var(--muted)}
.kpi .ktrend{font-size:11.5px;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:4px}
.up{color:var(--green)}.down{color:var(--green)}.bad{color:var(--red)}
.kpi.fusion{border-color:rgba(0,135,193,.4);background:linear-gradient(135deg,#fff 60%,rgba(102,203,255,.1))}
.kpi.fusion .tagf{position:absolute;top:10px;right:10px;font-size:8.5px;font-weight:800;letter-spacing:.4px;color:var(--navy);background:var(--lime);padding:2.5px 7px;border-radius:20px;text-transform:uppercase}

.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
.card-h{padding:16px 18px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-h h3{font-size:14.5px;font-weight:700;color:var(--navy)}
.card-h .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.card-b{padding:14px 18px 18px}
.toggle-mini{display:flex;background:var(--bg);border-radius:7px;padding:2px;gap:2px}
.toggle-mini button{border:0;background:0;padding:5px 10px;border-radius:5px;font-family:inherit;font-size:11.5px;font-weight:600;color:var(--muted);cursor:pointer}
.toggle-mini button.on{background:#fff;color:var(--navy);box-shadow:var(--shadow)}
.cols2{grid-template-columns:1fr 1fr}
.cols3{grid-template-columns:repeat(3,1fr)}
.col-2-1{grid-template-columns:2fr 1fr}

/* ---------- Tables ---------- */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--line)}
td{padding:11px 12px;border-bottom:1px solid var(--line);color:var(--ink)}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:var(--bg)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:30px}
.t-ok{background:rgba(3,97,71,.1);color:var(--green)}
.t-warn{background:rgba(255,182,0,.16);color:#9a6e00}
.t-bad{background:rgba(221,67,86,.12);color:var(--red)}
.t-neutral{background:var(--lilac);color:var(--purple-d)}
.t-sky{background:rgba(0,135,193,.12);color:var(--sky)}

/* ---------- Misc ---------- */
.chart-wrap{position:relative;height:240px}
.chart-wrap.sm{height:200px}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:11.5px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.note{background:linear-gradient(90deg,rgba(46,59,237,.05),transparent);border-left:3px solid var(--blue);padding:11px 14px;border-radius:0 8px 8px 0;font-size:12.5px;color:#3a3f63;margin-top:14px}
.note b{color:var(--navy)}
.savings-banner{background:linear-gradient(120deg,var(--blue),var(--cobalt));color:#fff;border-radius:18px;padding:18px 22px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;margin-bottom:18px;position:relative;overflow:hidden}
.savings-banner::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(102,203,255,.25),transparent 70%)}
.savings-banner .sb-main{display:flex;flex-direction:column}
.savings-banner .sb-main .lab{font-size:11px;text-transform:uppercase;letter-spacing:.6px;opacity:.7;font-weight:600}
.savings-banner .sb-main .big{font-size:32px;font-weight:800;letter-spacing:-.5px}
.savings-banner .sb-sub{font-size:12.5px;opacity:.85;max-width:300px;line-height:1.5}
.sb-stat{display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.18);padding-left:20px}
.sb-stat .v{font-size:19px;font-weight:800}.sb-stat .l{font-size:10.5px;opacity:.7;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

/* progress ring + bars */
.ring{--p:78;width:120px;height:120px;border-radius:50%;background:conic-gradient(var(--green) calc(var(--p)*1%),var(--lilac) 0);display:flex;align-items:center;justify-content:center}
.ring::before{content:"";position:absolute;width:88px;height:88px;border-radius:50%;background:#fff}
.ring .rv{position:relative;font-size:24px;font-weight:800;color:var(--navy)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px}
.bar-row .bl{width:120px;color:var(--muted);font-weight:600}
.bar-track{flex:1;height:9px;background:var(--lilac);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px}
.bar-row .bv{width:54px;text-align:right;font-weight:700;color:var(--navy)}

/* persona context line */
.persona-line{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 14px;margin-bottom:16px;font-size:12.5px;color:var(--muted)}
.persona-line b{color:var(--navy)}
.persona-line .who{display:flex;align-items:center;gap:7px;font-weight:600;color:var(--navy)}
.persona-line .av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(2,4,63,.5);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:540px;width:100%;box-shadow:var(--shadow-lg);overflow:hidden;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal-h h3{font-size:16px;color:var(--navy);font-weight:700}
.modal-h .x{cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
.modal-b{padding:20px 22px;max-height:64vh;overflow-y:auto}
.out-opt{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;cursor:pointer;transition:.15s}
.out-opt:hover{border-color:var(--blue);background:var(--bg)}
.out-opt .fico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0}
.out-opt h4{font-size:14px;color:var(--navy);font-weight:700}
.out-opt p{font-size:12px;color:var(--muted);margin-top:2px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:13px 20px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:200;opacity:0;transition:.3s;display:flex;align-items:center;gap:10px}
.toast.show{transform:translateX(-50%);opacity:1}

/* owner/occupier only visibility */
.owner-only,.occupier-only{display:none}
body[data-stk="owner"] .owner-only{display:block}
body[data-stk="owner"] .owner-only.kpi,body[data-stk="owner"] .owner-only.tag{display:flex}
body[data-stk="occupier"] .occupier-only{display:block}
body[data-stk="occupier"] .occupier-only.kpi,body[data-stk="occupier"] .occupier-only.tag{display:flex}
.stk-frame{font-style:italic}

footer{margin-left:244px;padding:18px 26px;color:var(--muted);font-size:11.5px;border-top:1px solid var(--line);background:#fff;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

@media(max-width:1080px){.cols2,.cols3,.col-2-1{grid-template-columns:1fr}}
@media(max-width:860px){.sidebar{transform:translateX(-100%);transition:.25s}.sidebar.open{transform:none}.main,footer{margin-left:0}.menu-btn{display:flex!important}}
.menu-btn{display:none}

/* ===== KNOWLEDGE BASE ===== */
.kb-shell{display:grid;grid-template-columns:220px 1fr;gap:32px;max-width:1100px}
.kb-toc{position:sticky;top:78px;align-self:start;height:fit-content}
.kb-toc-label{font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding:0 10px}
.kb-toc-link{display:block;padding:7px 10px;border-radius:7px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;margin-bottom:2px;border-left:2px solid transparent}
.kb-toc-link:hover{background:var(--bg);color:var(--navy)}
.kb-toc-link.on{background:rgba(46,59,237,.08);color:var(--navy);border-left-color:var(--blue)}
.kb-search{position:relative;margin-bottom:28px}
.kb-search input{width:100%;padding:11px 14px 11px 42px;border:1px solid var(--line);border-radius:11px;font-family:inherit;font-size:14px;background:#fff;outline:none}
.kb-search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,59,237,.12)}
.kb-search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.kb-section{margin-bottom:44px;scroll-margin-top:80px}
.kb-section > h2{font-size:21px;font-weight:800;color:var(--navy);margin-bottom:6px;letter-spacing:-.3px}
.kb-section > p.kb-intro{color:var(--muted);font-size:13.5px;margin-bottom:18px;max-width:680px}
.kb-entry{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px;box-shadow:var(--shadow)}
.kb-entry h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.kb-entry p{font-size:13px;color:#3a3f63;line-height:1.65}
.kb-entry .kb-related{font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.kb-entry .kb-related a{color:var(--blue);text-decoration:none;font-weight:600}
.kb-entry ol,.kb-entry ul{padding-left:22px;font-size:13px;color:#3a3f63;line-height:1.7;margin-top:8px}
.kb-entry ol li,.kb-entry ul li{margin-bottom:4px}
.kb-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--lime);color:var(--navy);text-transform:uppercase;letter-spacing:.4px}

/* ===== NEEDS ATTENTION list (used on Hub) ===== */
.na-list{display:flex;flex-direction:column}
.na-item{display:grid;grid-template-columns:30px 36px 1fr auto auto;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.na-item:last-child{border-bottom:0}
.na-rank{font-family:'IBM Plex Mono','Menlo',monospace;font-size:13px;font-weight:700;color:var(--muted);text-align:center}
.na-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.na-icon.crit{background:rgba(221,67,86,.12);color:var(--red)}
.na-icon.warn{background:rgba(255,182,0,.16);color:#9a6e00}
.na-icon.info{background:rgba(0,135,193,.12);color:var(--sky)}
.na-text{display:flex;flex-direction:column;gap:2px;min-width:0}
.na-title{font-size:13.5px;font-weight:700;color:var(--navy)}
.na-detail{font-size:12px;color:var(--muted);line-height:1.45}
.na-impact{font-family:'IBM Plex Mono','Menlo',monospace;font-size:13px;font-weight:700;color:var(--navy);text-align:right;white-space:nowrap}
.na-cta{background:transparent;border:0;color:var(--blue);font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;padding:4px 10px;border-radius:7px}
.na-cta:hover{background:var(--bg)}

/* ===== OUTLIER bars (energy-per-visitor on Hub) ===== */
.outlier-row{display:grid;grid-template-columns:130px 1fr 64px;gap:12px;align-items:center;padding:7px 0;font-size:12.5px}
.outlier-name{color:var(--navy);font-weight:600}
.outlier-bar-bg{position:relative;height:22px;background:var(--lilac);border-radius:6px;overflow:hidden}
.outlier-median{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(2,4,63,.35);z-index:2}
.outlier-bar{position:absolute;top:3px;bottom:3px}
.outlier-bar.neg{right:50%;border-radius:4px 0 0 4px}
.outlier-bar.pos{left:50%;border-radius:0 4px 4px 0}
.outlier-bar.crit{background:var(--red)}
.outlier-bar.high{background:var(--orange)}
.outlier-bar.mod{background:var(--amber)}
.outlier-bar.good{background:var(--mint)}
.outlier-val{font-family:'IBM Plex Mono','Menlo',monospace;font-size:12.5px;font-weight:700;text-align:right}
.outlier-val.crit{color:var(--red)}
.outlier-val.high{color:#854F0B}
.outlier-val.good{color:var(--green)}

/* ===== PAI completeness grid (SFDR) ===== */
.pai-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:10px}
.pai-cell{padding:10px 11px;border-radius:9px;border:1px solid var(--line)}
.pai-cell.complete{background:rgba(99,204,120,.12);border-color:rgba(99,204,120,.3)}
.pai-cell.partial{background:rgba(255,182,0,.13);border-color:rgba(255,182,0,.3)}
.pai-cell.missing{background:rgba(221,67,86,.1);border-color:rgba(221,67,86,.3)}
.pai-cell .pai-num{font-family:'IBM Plex Mono','Menlo',monospace;font-size:10.5px;font-weight:700;color:var(--muted)}
.pai-cell .pai-name{font-size:12px;font-weight:600;color:var(--navy);margin-top:2px;line-height:1.3}
.pai-cell .pai-status{font-size:10.5px;font-weight:700;margin-top:5px}
.pai-cell.complete .pai-status{color:var(--green)}
.pai-cell.partial .pai-status{color:#9a6e00}
.pai-cell.missing .pai-status{color:var(--red)}
@media(max-width:980px){.pai-grid{grid-template-columns:repeat(3,1fr)}}

/* ===== ACTION LOG (Carbon) ===== */
.action-row{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.action-row:last-child{border-bottom:0}
.action-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.action-ic.verified{background:rgba(99,204,120,.18);color:var(--green)}
.action-ic.pending{background:rgba(255,182,0,.18);color:#9a6e00}
.action-ic.planned{background:var(--bg);color:var(--muted)}
.action-meta{flex:1;min-width:0}
.action-meta h4{font-size:13.5px;font-weight:700;color:var(--navy)}
.action-meta p{font-size:11.5px;color:var(--muted);margin-top:2px}

/* ===== ROI tracker (EV/PV) ===== */
.roi-row{display:grid;grid-template-columns:1.6fr 80px 80px 1fr;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.roi-row:last-child{border-bottom:0}
.roi-pb{font-family:'IBM Plex Mono','Menlo',monospace;font-weight:700;color:var(--navy);text-align:right}
.roi-prog{height:7px;background:var(--lilac);border-radius:4px;overflow:hidden}
.roi-prog i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--mint));border-radius:4px}

/* ===== TRANSFER intake (new) ===== */
.intake-root .transfer-banner{background:linear-gradient(120deg,var(--purple),var(--purple-d));color:#fff;border-radius:16px;padding:20px 24px;margin-bottom:20px}
.intake-root .transfer-banner h3{font-size:18px;font-weight:800;margin-bottom:6px}
.intake-root .transfer-banner p{font-size:13px;opacity:.9;line-height:1.55}
.intake-root .transfer-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.intake-root .transfer-card{background:#fff;border:2px solid var(--line);border-radius:14px;padding:20px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:8px}
.intake-root .transfer-card:hover{border-color:var(--blue)}
.intake-root .transfer-card.on{border-color:var(--blue);background:linear-gradient(120deg,#fff,rgba(46,59,237,.04))}
.intake-root .transfer-card .ti{font-size:24px;margin-bottom:6px}
.intake-root .transfer-card h4{font-size:14px;color:var(--navy);font-weight:700}
.intake-root .transfer-card p{font-size:12.5px;color:var(--muted);line-height:1.55}
.intake-root .anon-detail{background:var(--bg);border-radius:11px;padding:14px 16px;margin-top:14px;font-size:12.5px;color:#3a3f63}
.intake-root .anon-detail strong{color:var(--navy)}
.intake-root .anon-detail ul{margin-top:6px;padding-left:18px;line-height:1.6}

/* ===== CSRD intake toggle ===== */
.intake-root .framework-toggle{display:flex;background:rgba(255,255,255,.16);border-radius:10px;padding:3px;gap:2px;margin-right:8px}
.intake-root .framework-toggle button{border:0;background:0;padding:7px 14px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.85);transition:.15s}
.intake-root .framework-toggle button.on{background:#fff;color:var(--navy);box-shadow:var(--shadow)}

/* ===== INTAKE ASSISTANT (scoped) ===== */
.intake-root{position:fixed;inset:0;background:var(--bg);z-index:50;overflow-y:auto;display:none}
.intake-root.open{display:block}
.intake-root *{box-sizing:border-box}




.intake-root /* ---- top bar ---- */
.topbar{height:60px;background:var(--blue);display:flex;align-items:center;padding:0 22px;gap:16px;position:sticky;top:0;z-index:40;box-shadow:0 2px 12px rgba(46,59,237,.18)}
.intake-root .topbar img.wm{height:26px;width:auto;display:block}
.intake-root .topbar .div{width:1px;height:24px;background:rgba(255,255,255,.25)}
.intake-root .topbar .ctx{color:#fff;font-size:13px;font-weight:600;opacity:.95}
.intake-root .topbar .ctx small{display:block;font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.intake-root .spacer{flex:1}
.intake-root .view-toggle{display:flex;background:rgba(255,255,255,.16);border-radius:10px;padding:3px;gap:2px}
.intake-root .view-toggle button{border:0;background:0;padding:7px 14px;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:7px;transition:.15s}
.intake-root .view-toggle button.on{background:#fff;color:var(--navy);box-shadow:var(--shadow)}
.intake-root .view-toggle button .d{width:7px;height:7px;border-radius:50%}
.intake-root .help-btn{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.intake-root .help-btn:hover{background:rgba(255,255,255,.26)}

.intake-root /* ---- layout ---- */
.stage{max-width:1080px;margin:0 auto;padding:28px 24px 80px}
.intake-root .stage.wide{max-width:1240px}
.intake-root .view{display:none}.intake-root .view.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.intake-root /* ---- generic ---- */
h2.title{font-size:24px;font-weight:800;color:var(--navy);letter-spacing:-.4px}
.intake-root .lead{color:var(--muted);font-size:14px;margin-top:4px;max-width:680px}
.intake-root .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
.intake-root .btn{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;border:0;border-radius:10px;padding:11px 18px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.intake-root .btn:hover{background:var(--cobalt)}
.intake-root .btn.lg{padding:13px 22px;font-size:14.5px}
.intake-root .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
.intake-root .btn.ghost:hover{border-color:var(--blue);color:var(--blue)}
.intake-root .btn.green{background:var(--green)}.intake-root .btn.green:hover{background:#024d39}
.intake-root .btn:disabled{opacity:.5;cursor:not-allowed}
.intake-root .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:30px}
.intake-root .t-ok{background:var(--okbg);color:var(--ok)}
.intake-root .t-warn{background:var(--warnbg);color:var(--warnc)}
.intake-root .t-bad{background:var(--badbg);color:var(--red)}
.intake-root .t-info{background:rgba(0,135,193,.12);color:var(--sky)}
.intake-root .t-skeleton{background:var(--lilac);color:var(--purple-d)}
.intake-root .t-review{background:rgba(255,182,0,.16);color:var(--warnc)}
.intake-root .t-verified{background:var(--okbg);color:var(--ok)}
.intake-root .t-progress{background:rgba(46,59,237,.1);color:var(--blue)}

.intake-root /* ---- progress + completeness ---- */
.completeness{display:flex;align-items:center;gap:14px}
.intake-root .cbar{flex:1;height:10px;background:var(--lilac);border-radius:6px;overflow:hidden;min-width:120px}
.intake-root .cbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--sky));transition:width .5s ease}
.intake-root .cpct{font-weight:800;color:var(--navy);font-size:15px}

.intake-root /* ---- intake choice cards ---- */
.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}
.intake-root .choice{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:22px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.intake-root .choice:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.intake-root .choice .ci{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.intake-root .choice h3{font-size:16px;color:var(--navy);font-weight:700}
.intake-root .choice p{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.5}
.intake-root .choice .pick{margin-top:14px;font-size:12.5px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:6px}
.intake-root .choice .rec{position:absolute;top:12px;right:12px;font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;background:var(--lime);color:var(--navy);padding:3px 8px;border-radius:20px}

.intake-root /* ---- dropzone ---- */
.dropzone{border:2px dashed var(--blue);border-radius:14px;background:rgba(46,59,237,.04);padding:34px;text-align:center;cursor:pointer;transition:.18s}
.intake-root .dropzone:hover, .intake-root .dropzone.drag{background:rgba(46,59,237,.08);border-color:var(--cobalt)}
.intake-root .dropzone .dz-ico{font-size:34px;margin-bottom:8px}
.intake-root .dropzone h4{color:var(--navy);font-size:15px;font-weight:700}
.intake-root .dropzone p{color:var(--muted);font-size:12.5px;margin-top:5px}

.intake-root /* ---- tables ---- */
table{width:100%;border-collapse:collapse;font-size:13px}
.intake-root th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);background:#FAFBFD}
.intake-root td{padding:11px 12px;border-bottom:1px solid var(--line)}
.intake-root tbody tr:last-child td{border-bottom:0}
.intake-root tbody tr:hover{background:#FAFBFD}
.intake-root .mapping-row td{padding:8px 12px}
.intake-root select.map, .intake-root select.inp, .intake-root input.inp{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--ink);background:#fff;width:100%;outline:0}
.intake-root select.map:focus, .intake-root select.inp:focus, .intake-root input.inp:focus{border-color:var(--blue)}
.intake-root .cellflag{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}

.intake-root /* ---- wizard ---- */
.wizard-grid{display:grid;grid-template-columns:230px 1fr;gap:24px;align-items:start}
.intake-root .steps{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;box-shadow:var(--shadow);position:sticky;top:84px}
.intake-root .step{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:.15s}
.intake-root .step:hover{background:var(--bg)}
.intake-root .step.on{background:rgba(46,59,237,.08)}
.intake-root .step .sn{width:26px;height:26px;border-radius:50%;background:var(--lilac);color:var(--purple-d);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.intake-root .step.on .sn{background:var(--blue);color:#fff}
.intake-root .step.done .sn{background:var(--green);color:#fff}
.intake-root .step .sl{font-size:13px;font-weight:600;color:var(--ink)}
.intake-root .step .sl small{display:block;font-size:10.5px;color:var(--muted);font-weight:500}
.intake-root .step.on .sl{color:var(--navy)}

.intake-root .wpanel{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.intake-root .wpanel .wp-h{padding:22px 26px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#FAFBFF,#fff)}
.intake-root .wpanel .wp-h h3{font-size:19px;color:var(--navy);font-weight:800}
.intake-root .wpanel .wp-h p{font-size:13px;color:var(--muted);margin-top:4px}
.intake-root .wpanel .wp-b{padding:24px 26px}
.intake-root .wpanel .wp-f{padding:18px 26px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:#FAFBFD}
.intake-root .field{margin-bottom:18px}
.intake-root .field label{display:block;font-size:12.5px;font-weight:700;color:var(--navy);margin-bottom:6px}
.intake-root .field .why{font-size:11px;color:var(--sky);cursor:pointer;font-weight:600;margin-left:6px}
.intake-root .field .hint{font-size:11.5px;color:var(--muted);margin-top:5px}
.intake-root .field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.intake-root .radio-row{display:flex;gap:10px;flex-wrap:wrap}
.intake-root .radio-row label{flex:1;min-width:120px;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);transition:.15s;display:flex;align-items:center;gap:9px}
.intake-root .radio-row label:hover{border-color:var(--blue)}
.intake-root .radio-row input{accent-color:var(--blue)}
.intake-root .radio-row label.sel{border-color:var(--blue);background:rgba(46,59,237,.05)}

.intake-root /* prefilled / confidence chips */
.prefill{background:var(--okbg);border:1px solid #B8DECB;color:var(--ok);font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.intake-root .conf{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.intake-root .conf.hi{background:var(--okbg);color:var(--ok)}
.intake-root .conf.mid{background:var(--warnbg);color:var(--warnc)}
.intake-root .conf.lo{background:var(--badbg);color:var(--red)}

.intake-root /* doc reader */
.extract{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:10px}
.intake-root .extract-h{padding:13px 16px;background:linear-gradient(120deg,var(--navy),var(--cobalt));color:#fff;display:flex;align-items:center;gap:12px}
.intake-root .extract-h .fi{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.intake-root .extract-h h4{font-size:14px;font-weight:700}
.intake-root .extract-h p{font-size:11px;opacity:.85}
.intake-root .compare{display:grid;grid-template-columns:1fr 1fr;gap:0}
.intake-root .compare .src{background:#F7F8FB;border-right:1px solid var(--line);padding:16px}
.intake-root .compare .found{padding:16px}
.intake-root .compare h5{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:10px}
.intake-root .docfield{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:12.5px}
.intake-root .docfield:last-child{border-bottom:0}
.intake-root .docfield .k{color:var(--muted)}
.intake-root .docfield .v{font-weight:700;color:var(--navy);text-align:right}
.intake-root .src .docfield .v{font-weight:600;color:#3a3f63;font-family:'SF Mono',Menlo,monospace;font-size:11.5px}

.intake-root /* analysing animation */
.analysing{text-align:center;padding:34px}
.intake-root .scanbar{width:200px;height:6px;background:var(--lilac);border-radius:4px;margin:16px auto;overflow:hidden;position:relative}
.intake-root .scanbar::after{content:"";position:absolute;left:-40%;top:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--blue),transparent);animation:scan 1.1s linear infinite}
@keyframes scan{to{left:120%}}

.intake-root /* ---- portfolio home ---- */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}
.intake-root .sumcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow)}
.intake-root .sumcard .l{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.intake-root .sumcard .v{font-size:24px;font-weight:800;color:var(--navy);margin-top:3px}

.intake-root /* banners */
.banner{border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:18px}
.intake-root .banner.skeleton{background:linear-gradient(120deg,var(--blue),var(--cobalt));color:#fff}
.intake-root .banner.assist{background:linear-gradient(120deg,#3a1659,var(--purple-d));color:#fff}
.intake-root .banner .bi{font-size:26px}
.intake-root .banner .bt{flex:1}
.intake-root .banner .bt h4{font-size:15px;font-weight:800}
.intake-root .banner .bt p{font-size:12.5px;opacity:.9;margin-top:2px;line-height:1.45}
.intake-root .banner .btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3)}
.intake-root .banner .btn:hover{background:rgba(255,255,255,.3)}

.intake-root /* note / why box */
.note{background:linear-gradient(90deg,rgba(46,59,237,.05),transparent);border-left:3px solid var(--blue);padding:11px 14px;border-radius:0 8px 8px 0;font-size:12.5px;color:#3a3f63;margin-top:16px}
.intake-root .note b{color:var(--navy)}
.intake-root .demo-note{background:#FFF8E8;border:1px dashed var(--amber);border-radius:10px;padding:10px 13px;font-size:11.5px;color:#7a5a00;margin-top:14px}
.intake-root .demo-note b{color:#5c4400}

.intake-root /* upgrade prompt */
.upgrade{border:1.5px solid var(--purple);background:linear-gradient(120deg,#fff,rgba(161,80,239,.06));border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;margin-top:18px}
.intake-root .upgrade .ui{width:42px;height:42px;border-radius:11px;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.intake-root .upgrade h4{font-size:14px;color:var(--navy);font-weight:700}
.intake-root .upgrade p{font-size:12px;color:var(--muted);margin-top:2px}
.intake-root .upgrade .btn{background:var(--purple);margin-left:auto}
.intake-root .upgrade .btn:hover{background:var(--purple-d)}

.intake-root /* reviewer */
.queue-tabs{display:flex;gap:6px;margin:16px 0}
.intake-root .queue-tabs button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 14px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
.intake-root .queue-tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.intake-root .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}

.intake-root /* modal */
.modal-bg{position:fixed;inset:0;background:rgba(2,4,63,.55);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.intake-root .modal-bg.show{display:flex}
.intake-root .modal{background:#fff;border-radius:16px;max-width:580px;width:100%;box-shadow:var(--shadow-lg);max-height:86vh;display:flex;flex-direction:column;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1}}
.intake-root .modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.intake-root .modal-h h3{font-size:17px;color:var(--navy);font-weight:700}
.intake-root .modal-h .x{cursor:pointer;color:var(--muted);font-size:22px;line-height:1}
.intake-root .modal-b{padding:20px 22px;overflow-y:auto}
.intake-root .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:13px 20px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:200;opacity:0;transition:.3s}
.intake-root .toast.show{transform:translateX(-50%);opacity:1}

@media(max-width:900px){.intake-root .wizard-grid{grid-template-columns:1fr}.intake-root .steps{position:static}.intake-root .choices{grid-template-columns:1fr}.intake-root .summary-row{grid-template-columns:1fr 1fr}.intake-root .compare{grid-template-columns:1fr}.intake-root .field-row{grid-template-columns:1fr}}

/* ===== Widgeteria additions ===== */
.info-i{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;border:1.3px solid var(--muted);color:var(--muted);font-size:9.5px;font-weight:700;font-style:normal;cursor:help;position:relative;vertical-align:middle;margin-left:5px;line-height:1;flex:none}
.info-i:hover,.info-i:focus{border-color:var(--blue);color:var(--blue);outline:none}
.info-i .info-tip{visibility:hidden;opacity:0;position:fixed;transform:translateX(-50%) translateY(4px);background:var(--navy);color:#fff;padding:9px 11px;border-radius:9px;font-size:11.5px;font-weight:500;line-height:1.5;width:228px;text-align:left;box-shadow:var(--shadow-lg);z-index:9999;transition:opacity .15s,transform .15s;pointer-events:none;text-transform:none;letter-spacing:0}
.info-i:hover .info-tip,.info-i:focus .info-tip{visibility:visible;opacity:1;transform:translateX(-50%) translateY(0)}
.pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.pf{display:flex;flex-direction:column;gap:4px;font-size:12px}
.pf>span{font-weight:600;color:var(--navy)}
.pf input,.pf select{padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13px;color:var(--navy);background:#fff}
.pf-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:16px 0 8px}
.pf-uploads{display:flex;flex-direction:column;gap:9px}
.pf-drop{display:flex;align-items:center;gap:12px;border:1.5px dashed var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;transition:.15s}
.pf-drop:hover{border-color:var(--blue);background:var(--bg)}
.pf-drop-ic{width:34px;height:34px;border-radius:9px;background:rgba(46,59,237,.1);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800}
.pf-drop-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
#modal .modal-b{max-height:74vh;overflow:auto}
.card-h h3 .info-i{margin-left:7px}
/* energy-per-visitor outlier bars */
.ev-row{display:grid;grid-template-columns:130px 1fr 56px;gap:12px;align-items:center;padding:6px 0;font-size:12.5px}
.ev-name{color:var(--navy);font-weight:600}
.ev-track{position:relative;height:22px;background:var(--lilac);border-radius:6px}
.ev-fill{position:absolute;left:0;top:3px;bottom:3px;border-radius:5px}
.ev-med{position:absolute;top:-3px;bottom:-3px;width:0;border-left:2px dashed rgba(2,4,63,.5);z-index:3}
.ev-med-lab{position:absolute;top:-15px;transform:translateX(-50%);font-size:9.5px;font-weight:700;color:var(--muted);white-space:nowrap}
.ev-val{font-family:'IBM Plex Mono','Menlo',monospace;font-weight:700;text-align:right;color:var(--navy)}
/* geographic map */
.geo{display:grid;grid-template-columns:1fr 232px;gap:18px;align-items:stretch}
@media(max-width:760px){.geo{grid-template-columns:1fr}}
.geo-map{position:relative;background:linear-gradient(160deg,#F6F8FF,#EAEDF9);border-radius:14px;border:1px solid var(--line);min-height:330px;overflow:hidden}
.geo-map svg{width:100%;height:100%;display:block}
.geo-side{display:flex;flex-direction:column;gap:9px;justify-content:center}
.geo-stat{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 13px}
.geo-stat .gv{font-size:21px;font-weight:800;color:var(--navy);line-height:1}
.geo-stat .gl{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px}
.geo-leg{display:flex;flex-direction:column;gap:7px;font-size:11.5px;color:var(--muted);margin-top:4px}
.geo-leg span{display:inline-flex;align-items:center;gap:8px}
.geo-leg i{width:10px;height:10px;border-radius:50%;display:inline-block;flex:none}
.geo-dot{cursor:pointer}
.geo-dot:hover{stroke:#fff;stroke-width:2.5}

/* lime Edyfi-Insight hero variant */
.savings-banner.insight{background:linear-gradient(120deg,var(--lime),#bcd63f);color:var(--navy)}
.savings-banner.insight::after{background:radial-gradient(circle,rgba(255,255,255,.4),transparent 70%)}
.savings-banner.insight .sb-main .lab{opacity:.62;color:var(--navy)}
.savings-banner.insight .sb-sub{opacity:.82;color:var(--navy)}
.savings-banner.insight .sb-stat{border-left-color:rgba(2,4,63,.16)}
.savings-banner.insight .sb-stat .l{opacity:.6}
.savings-banner .sb-badge{position:absolute;top:14px;right:18px;background:var(--navy);color:var(--lime);font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:4px 9px;border-radius:999px;z-index:3}

/* ===== rebuilt-pages widgets ===== */
.mile{display:flex;align-items:flex-start;min-width:560px}
.mile-step{display:flex;flex-direction:column;align-items:center;text-align:center;flex:0 0 auto;width:98px}
.mile-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;box-shadow:0 0 0 4px #fff,0 0 0 5px var(--line)}
.mile-yr{font-size:13px;font-weight:800;color:var(--navy);margin-top:9px}
.mile-pct{font-size:12px;font-weight:700;margin-top:2px}
.mile-sub{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.3}
.mile-line{flex:1;height:2px;background:var(--line);margin-top:10px;min-width:18px}
.v2ph{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border:2px dashed var(--line);border-radius:14px;padding:28px 24px;min-height:210px;background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(2,4,63,.012) 10px,rgba(2,4,63,.012) 20px)}
.v2ph-ic{font-size:32px;opacity:.5}
.v2ph-t{font-size:15px;font-weight:800;color:var(--navy);margin-top:8px}
.v2ph-d{font-size:12.5px;color:var(--muted);max-width:340px;line-height:1.55;margin-top:6px}
.gauge-bars{display:flex;align-items:flex-end;gap:5px;justify-content:center;height:86px;padding-top:8px}
.gb{display:flex;flex-direction:column;align-items:center;gap:3px}
.gb-track{position:relative;width:13px;height:70px;display:flex;align-items:flex-end}
.gb-tgt{position:absolute;left:0;right:0;bottom:0;border:1px dashed rgba(2,4,63,.28);border-radius:3px}
.gb-act{position:relative;width:100%;border-radius:3px}
.gb-l{font-size:8.5px;color:var(--muted)}
.cmix-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-size:12.5px}
.cmix-name{width:130px;color:var(--navy);font-weight:600;flex:none}
.cmix-track{flex:1;display:flex;height:22px;border-radius:6px;overflow:hidden;background:var(--lilac)}
.cmix-seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}
.cat-list{display:flex;flex-direction:column;gap:6px;width:100%}
.cat-row{display:grid;grid-template-columns:18px 54px 1fr 40px;gap:8px;align-items:center;font-size:11.5px}
.cat-rank{color:var(--muted);font-weight:700;text-align:center}
.cat-code{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--navy)}
.cat-track{height:8px;background:var(--lilac);border-radius:4px;overflow:hidden}
.cat-track div{height:100%;border-radius:4px}
.cat-val{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--navy);text-align:right}
.kb-lang{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.5px;color:var(--blue);background:rgba(46,59,237,.1);border-radius:5px;padding:1px 6px;margin-right:8px;vertical-align:middle}
.lang button{min-width:42px;justify-content:center}

/* ===== iPad / tablet responsive layer ===== */
.nav-scrim{display:none;position:fixed;inset:0;background:rgba(2,4,63,.45);z-index:35}
.nav-scrim.show{display:block}
.tb-title{min-width:0}
.info-i.tip-open .info-tip{visibility:visible;opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:1024px){
  .topbar .search{display:none}
  .topbar{padding:0 14px;gap:10px}
  #ptitle{font-size:19px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}

}
/* filter bar */
.filterbar{position:sticky;top:60px;z-index:25;background:var(--card);border-bottom:1px solid var(--line);box-shadow:0 1px 6px rgba(2,4,63,.04)}
.fb-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:10px 24px 8px}
.fb-ic{font-size:14px;opacity:.7}
.fb-sel{appearance:none;-webkit-appearance:none;background:#fff;border:1px solid var(--line);border-radius:11px;padding:8px 30px 8px 12px;font-family:inherit;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236B7194'/></svg>");background-repeat:no-repeat;background-position:right 12px center}
.fb-btn{background:#fff;border:1px solid var(--line);border-radius:11px;padding:8px 13px;font-family:inherit;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer}
.fb-btn:hover{border-color:var(--blue)}
.fb-spacer{flex:1}
.fb-seg{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:3px}

.fb-more.show{display:flex}
.fb-more label{display:flex;align-items:center;justify-content:space-between;gap:16px;font-size:12.5px;font-weight:600;color:var(--muted)}
.fb-active{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:0 24px 10px}
.fb-active-lab{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.fb-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--navy)}

@media(max-width:820px){.fb-row,.fb-active{padding-left:14px;padding-right:14px}.fb-spacer{flex-basis:100%;height:0}}

}

function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=NAV.map(g=>{
    const head=`<div class="nav-section">${g.jdot?`<span class="jdot" style="background:${g.jdot}"></span>`:''}${g.sec}</div>`;
    const items=g.items.map(it=>{
      const soon=it.soon?`<span class="badge-soon">${it.soon}</span>`:'';
      const cnt=it.count?`<span class="badge-count">${it.count}</span>`:'';
      const cls=it.soon?'nav-item soon':'nav-item';
      const onclick=it.soon?`onclick="teaser('${it.id}')"`:`onclick="go('${it.id}')"`;
      const lbl=(it.id==='sfdr'&&document.body.dataset.stk==='occupier')?'ESG':it.label;
      return `<div class="${cls}" data-id="${it.id}" ${onclick}>${svg(ICON[it.icon])}<span>${lbl}</span>${soon}${cnt}</div>`;
    }).join('');
    return head+items;
  }).join('');
  translateTree(nav);
}

/* ---------------- Stakeholder toggle ---------------- */
function setStk(s){
  document.body.dataset.stk=s;
  document.getElementById('stk-foot').textContent='Viewing as: '+(s==='owner'?'Property Owner':'Grocery Occupier');
  buildNav();
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===currentPage));
  // re-render current page so persona lines & framing update
  if(currentPage) renderPage(currentPage,true);
  translateChrome();
  buildFilterBar();
}

/* ---------------- Router ---------------- */
let currentPage=null; const charts={};
function go(id){
  if(id==='sfdr-queue'){Intake.openReviewer();return;}

  currentPage=id;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.id===id));
  renderPage(id);
  window.scrollTo(0,0);
  if(window.innerWidth<860) document.getElementById('sidebar').classList.remove('open');
}
function teaser(id){ go('teaser:'+id); }

function expPageTitle(){var t=document.getElementById('ptitle');return t?t.textContent:'edyfi';}
function expFilterSummary(){
  var owner=document.body.dataset.stk==='owner';
  var parts=[tr('Period')+': '+tr(FILT.period), tr('Scope')+': '+scopeLabelText(), tr('View')+': '+(owner?tr('Owner'):tr('Occupier'))];

  if(FILT.ev!=='any')parts.push(tr('Has EV')+': '+tr(FILT.ev));
  if(FILT.epc!=='any')parts.push('EPC: '+FILT.epc);
  return parts.join('   ·   ');
}
function expClean(s){return (s||'').replace(/\s+/g,' ').trim();}
function expScrapeKpis(){
  return [].slice.call(document.querySelectorAll('#pages .kpi')).map(function(k){
    var lab=k.querySelector('.klabel'), val=k.querySelector('.kval'), label='';
    if(lab){var c=lab.cloneNode(true);c.querySelectorAll('.info-i,.info-tip').forEach(function(e){e.remove();});label=expClean(c.textContent);}
    return {label:label, val:val?expClean(val.textContent):''};
  }).filter(function(x){return x.label;});
}
function expScrapeTables(){
  return [].slice.call(document.querySelectorAll('#pages table')).map(function(t){
    var headers=[].slice.call(t.querySelectorAll('thead th')).map(function(th){return expClean(th.textContent);});
    var rows=[].slice.call(t.querySelectorAll('tbody tr')).map(function(tr){
      return [].slice.call(tr.querySelectorAll('td')).map(function(td){return expClean(td.textContent);});
    }).filter(function(r){return r.length;});
    return {headers:headers, rows:rows};
  }).filter(function(t){return t.headers.length||t.rows.length;});
}
function expFileBase(){return 'edyfi_'+(currentPage||'page')+'_'+new Date().toISOString().slice(0,10);}
function expDownload(blob,name){var u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(u);},1500);}
function toggleExport(e){if(e)e.stopPropagation();var m=document.getElementById('exportMenu');if(m)m.classList.toggle('show');}
function closeExport(){var m=document.getElementById('exportMenu');if(m)m.classList.remove('show');}

function exportCSV(){
  var esc=function(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"';};
  var L=[];
  L.push(esc('edyfi — '+expPageTitle()));
  L.push(esc(expFilterSummary()));
  L.push(esc(tr('Generated')+' '+new Date().toLocaleString()));
  L.push('');
  var kp=expScrapeKpis();
  if(kp.length){L.push(esc(tr('Metric'))+','+esc(tr('Value')));kp.forEach(function(k){L.push(esc(k.label)+','+esc(k.val));});L.push('');}
  expScrapeTables().forEach(function(t){
    if(t.headers.length)L.push(t.headers.map(esc).join(','));
    t.rows.forEach(function(r){L.push(r.map(esc).join(','));});
    L.push('');
  });
  expDownload(new Blob(['\ufeff'+L.join('\r\n')],{type:'text/csv;charset=utf-8'}), expFileBase()+'.csv');
  closeExport();
}

function exportPDF(){
  if(!(window.jspdf&&window.jspdf.jsPDF)){alert('PDF library is still loading — try again in a moment.');return;}
  var jsPDF=window.jspdf.jsPDF, doc=new jsPDF({unit:'pt',format:'a4'});
  var W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), M=40, y;
  doc.setFillColor(2,4,63);doc.rect(0,0,W,72,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(20);doc.text('edyfi',M,38);
  doc.setFontSize(13);doc.setFont('helvetica','normal');doc.text(expPageTitle(),M,58);
  doc.setTextColor(70,75,110);doc.setFontSize(8.5);
  doc.text(doc.splitTextToSize(expFilterSummary(),W-M*2),M,92);
  doc.setTextColor(150,150,165);doc.text(tr('Generated')+' '+new Date().toLocaleString(),W-M,92,{align:'right'});
  y=114;
  var kp=expScrapeKpis();
  if(kp.length){doc.autoTable({startY:y,head:[[tr('Metric'),tr('Value')]],body:kp.map(function(k){return [k.label,k.val];}),
    theme:'grid',headStyles:{fillColor:[46,59,237],fontSize:9},styles:{fontSize:9,cellPadding:4},margin:{left:M,right:M}});
    y=doc.lastAutoTable.finalY+18;}
  [].slice.call(document.querySelectorAll('#pages canvas')).forEach(function(c){
    try{var img=c.toDataURL('image/png');var ratio=(c.height&&c.width)?c.height/c.width:0.5;var w=W-M*2,h=Math.min(w*ratio,220);
      if(y+h>H-M){doc.addPage();y=M;}doc.addImage(img,'PNG',M,y,w,h);y+=h+16;}catch(e){}
  });

    if(y>H-90){doc.addPage();y=M;}

  doc.save(expFileBase()+'.pdf');
  closeExport();
}

function renderPage(id,keepScroll){
  closeNav();
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});
  for(const k in charts)delete charts[k];
  const host=document.getElementById('pages');
  let res;
  if(id.startsWith('teaser:')){res=teaserPage(id.split(':')[1]);}
  else {const fn=PAGES[id]; res=fn?fn():{html:'<p style="color:var(--muted)">Coming soon.</p>',title:'edyfi',crumb:'edyfi'};}
  document.getElementById('ptitle').textContent=tr(res.title||PTITLE[id]||'edyfi');
  document.getElementById('crumb').textContent=tr(res.crumb||'edyfi');
  host.innerHTML=`<div class="page active">${res.html}</div>`;
  if(res.init){try{res.init()}catch(e){console.error(e)}}
  translateTree(host);
}

function mkChart(ctx,type,labels,datasets,opts={}){
  if(!ctx)return;
  labels=(labels||[]).map(tr);
  datasets=datasets.map(function(d){var o=Object.assign({},d); if(o.label!=null)o.label=tr(o.label); return o;});
  if(opts&&opts.scales){['x','y','y1'].forEach(function(ax){ if(opts.scales[ax]&&opts.scales[ax].title&&opts.scales[ax].title.text) opts.scales[ax].title.text=tr(opts.scales[ax].title.text);});}
  const c=new Chart(ctx,{type,data:{labels,datasets},options:Object.assign({
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:datasets.length>1,position:'bottom',labels:{boxWidth:10,boxHeight:10,usePointStyle:true,font:{size:11},color:C.muted,padding:14}}},
    scales:{x:{grid:{display:false},ticks:{color:C.muted,font:{size:11}}},
            y:{grid:{color:'#EEF0F7'},ticks:{color:C.muted,font:{size:11}},beginAtZero:true}},
  },opts)});
  charts[ctx.id]=c; return c;
}

function personaLine(owner,occ){
  const o=document.body.dataset.stk==='owner';

  const ini=o?'AM':'SM';
  return `<div class="persona-line">
    <span class="who"><span class="av" style="background:${av}">${ini}</span>${who}</span>
    <span>·</span><span>${o?owner:occ}</span></div>`;
}
function jbanner(j){
  if(j==='report')return `<div class="jbanner j-report"><span class="jdot"></span>Report · Understand &amp; prove</div>`;
  if(j==='optimise')return `<div class="jbanner j-optimise"><span class="jdot"></span>Optimise · Reduce costs &amp; plan</div>`;
  return '';
}

    kpi('prop',C.amber,'Floor area',fmtInt(AG.area),'m²','↑ 5% vs LY'),
    kpi('users',C.blue,'Visitors',fmtM(AG.vis),'','↑ 4.1% vs prev period',null,false,'Total visitors across your stores in the active time window — the window follows your Time filter.'),

  const hero = owner ? `

    labels:['2022','2023','2024','2025','2030','2035','2040','2045'],

    target:sc([510,482,454,425,295,145,0]),targetLab:'Company commitment · Rewe 2050'
  };

  const geoLegend=owner?[[C.red,'Significant drop (>20%)'],[C.amber,'Trending down (10–20%)'],[C.mint,'Trending up'],[C.muted,'Stable (±10%)']]
                       :[[C.mint,'Improving intensity'],[C.muted,'Stable'],[C.red,'Worsening']];
  const frame=owner?'Portfolio-wide compliance, valuation and savings position across '+AG.count+' assets.'
                   :'Real-time operational performance across '+AG.count+' stores — footfall, energy and savings.';

  /* PAI readiness (owner) */
  const paiGroups=[['Scope 1/2',92],['EPC',68],['Fossil exposure',81],['Energy',84],['Renewable share',76]];

    kpi('prop',C.purple,'Catchment reach','82','%','within 25km · top DE-HR',null,false,'Share of visitors originating within the configured radius (default 25km).'),
    kpi('users',C.pink,'Repeat shoppers','58','%','↑ 4pp vs LY',null,true,'Returning vehicles seen multiple times in the period — derived from ANPR plate recognition.'),
  ];

  /* heatmap helper (7 rows DoW x 12 hour cols) */
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  function heatSvg(fn,maxLabel){
    const cw=46,lw=42,rh=24,cols=12;
    let svgc=`<svg viewBox="0 0 ${lw+cols*cw+8} ${days.length*rh+30}" style="width:100%;height:auto" font-family="Inter,sans-serif">`;
    svgc+=days.map((d,r)=>`<text x="${lw-6}" y="${24+r*rh+rh/2}" font-size="10" fill="${C.muted}" text-anchor="end">${d}</text>`).join('');
    for(let c=0;c<cols;c++) svgc+=`<text x="${lw+c*cw+cw/2}" y="14" font-size="9" fill="${C.muted}" text-anchor="middle">${(7+c).toString().padStart(2,'0')}</text>`;
    for(let r=0;r<days.length;r++) for(let c=0;c<cols;c++){
      const [intensity,col,tip]=fn(r,c);
      svgc+=`<rect x="${lw+c*cw+1}" y="${18+r*rh+1}" width="${cw-2}" height="${rh-3}" rx="3" fill="${col}" fill-opacity="${intensity.toFixed(2)}"><title>${tip}</title></rect>`;
    }
    return svgc+'</svg>';
  }
  const densityHeat=heatSvg((r,c)=>{
    const open=c>=2&&c<11; const wknd=r>=4?1.1:1; const sat=r===5;
    let v=0.06; if(open){ v=(c>=4&&c<=8?(sat?0.9:r===4?0.78:0.6):0.4)*wknd; } if(r===6&&c<3)v=0.04;
    return [Math.min(v,1),C.blue,`${days[r]} ${(7+c).toString().padStart(2,'0')}:00 · density ${(v*100|0)}%`];
  });
  const shortStopHeat=heatSvg((r,c)=>{
    // short-stop SHARE higher early/late & sundays (drive-through noise)
    let s=0.05; const edge=(c<=2||c>=10); if(edge)s=0.5; if(c<=1)s=0.75; if(r===6)s=Math.min(1,s+0.25); s=Math.min(s,1);
    return [Math.max(0.08,s),C.orange,`${days[r]} ${(7+c).toString().padStart(2,'0')}:00 · short-stop share ${(s*100|0)}%`];
  });

  /* catchment map — reuse real Germany geometry */
  const regions = owner
    ? [['DE-HR',74.5],['DE-FZ',6.6],['DE-KS',3.5],['DE-MEG',2.2],['DE-WOB',1.2],['DE-ZIG',1.0],['DE-HEF',0.8],['DE-WA',0.5],['DE-KB',0.5],['DE-MR',0.5]]
    : [['DE-HR',71.2],['DE-FZ',7.8],['DE-KS',4.2],['DE-MEG',2.6],['DE-WOB',1.4],['DE-ZIG',1.2],['DE-HEF',0.9],['DE-WA',0.6],['DE-KB',0.6],['DE-MR',0.5]];
  const cx=270,cy=250; // cluster centroid in the 380x460 viewBox

    <path d="${GEO_DE_OUTLINE}" fill="none" stroke="#9aa0c4" stroke-width="1.3"/>
    <circle cx="${cx}" cy="${cy}" r="56" fill="${C.sky}" opacity="0.08"/>
    <circle cx="${cx}" cy="${cy}" r="36" fill="${C.sky}" opacity="0.12"/>
    <circle cx="${cx}" cy="${cy}" r="18" fill="${C.sky}" opacity="0.20"/>
    <circle cx="${cx}" cy="${cy}" r="7" fill="${C.cobalt}" stroke="#fff" stroke-width="1.6"><title>Primary catchment · DE-HR ${regions[0][1]}%</title></circle>
    <text x="${cx}" y="${cy+76}" text-anchor="middle" font-size="10" fill="${C.muted}" font-weight="600" font-family="Inter,sans-serif">25km catchment</text>
  </svg>`;
  const regList=regions.map((r,i)=>`<div class="cat-row"><span class="cat-rank">${i+1}</span><span class="cat-code">${r[0]}</span><div class="cat-track"><div style="width:${Math.min(100,r[1]/regions[0][1]*100)}%;background:${i===0?C.cobalt:C.sky}"></div></div><span class="cat-val">${r[1]}%</span></div>`).join('');

  return {title:'Retail Analytics',crumb:'Optimise',html:`
    ${jbanner('optimise')}
    ${personaLine('Footfall performance evidencing rental premiums & asset value','Customer flow you can act on — staffing, hours, layout')}
    <div class="grid kpis">${k.join('')}</div>

    <div class="grid cols2">
      <div class="card"><div class="card-h"><div><h3>Footfall vs energy ${info('Hourly visitors against energy draw. The gap where energy stays high with few visitors is off-engagement waste.')}<span class="tagf" style="position:static;display:inline-block;margin-left:6px">Edyfi Insight</span></h3><div class="sub">Off-engagement gap: 06:00–08:30 daily</div></div></div>
        <div class="card-b"><div class="chart-wrap"><canvas id="reMain"></canvas></div>
          <div class="note" style="margin-top:8px">Energy stays high after 21:00 despite footfall near zero — refrigeration &amp; HVAC running unoptimised after close.</div></div></div>
      <div class="card"><div class="card-h"><div><h3>Car park occupancy ${info('Spaces filled across the day against total capacity (ANPR entries minus exits). Sustained full periods flag capacity pressure.')}</h3><div class="sub">Spaces filled vs capacity · typical day</div></div></div>
        <div class="card-b"><div class="chart-wrap"><canvas id="rePark"></canvas></div></div></div>
    </div>

    <div class="grid cols2" style="margin-top:16px">
      <div class="card"><div class="card-h"><div><h3>Dwell-time distribution ${info('Visit length in 15-minute buckets. Short stops sit leftmost; a long tail past two hours indicates destination behaviour.')}</h3><div class="sub">Engagement depth across visits</div></div></div>
        <div class="card-b"><div class="chart-wrap"><canvas id="reDwell"></canvas></div></div></div>
      <div class="card"><div class="card-h"><div><h3>EV share trend ${info('EV share of detected vehicles over time, rolling-averaged. A forward signal for chargepoint demand — see EV & PV.')}</h3><div class="sub">Monthly EV % of total vehicles · rolling avg</div></div></div>
        <div class="card-b"><div class="chart-wrap"><canvas id="reEv"></canvas></div></div></div>
    </div>

    <div class="grid cols2" style="margin-top:16px">
      <div class="card"><div class="card-h"><div><h3>Visitor density ${info('Average density by day-of-week and time-of-day. The operations-planning view for staffing, marketing and HVAC schedules.')}</h3><div class="sub">Darker = busier · day × time</div></div></div>
        <div class="card-b" style="padding-top:4px">${densityHeat}</div></div>
      <div class="card"><div class="card-h"><div><h3>Visitor vs short stop ${info('Share of detected vehicles that are short stops (under 5 min). Hot cells are hours the site is driven through but not engaged with.')}<span class="tagf" style="position:static;display:inline-block;margin-left:6px">Edyfi Insight</span></h3><div class="sub">Short-stop share · day × time</div></div>

  `, init:()=>{

  ];

  /* PV uptime & yield table */
  const yields = owner
    ? [['Kaufland Plauen','280 kWp','312 MWh','340 MWh','92%','ok'],['Lidl Leipzig','220 kWp','248 MWh','255 MWh','97%','ok'],['Rewe Dresden','160 kWp','171 MWh','180 MWh','95%','ok'],['Aldi Chemnitz','180 kWp','198 MWh','205 MWh','97%','ok'],['Edeka Freiberg','180 kWp','140 MWh','180 MWh','78%','warn']]
    : [['Lidl Leipzig','220 kWp','248 MWh','255 MWh','97%','ok'],['Rewe Dresden','160 kWp','171 MWh','180 MWh','95%','ok'],['Aldi Chemnitz','180 kWp','198 MWh','205 MWh','97%','ok'],['Edeka Freiberg','180 kWp','140 MWh','180 MWh','78%','warn']];

  /* chargepoint utilisation heatmap */
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const cw=46,lw=42,rh=24,cols=12;
  let chSvg=`<svg viewBox="0 0 ${lw+cols*cw+8} ${days.length*rh+30}" style="width:100%;height:auto" font-family="Inter,sans-serif">`;
  chSvg+=days.map((d,r)=>`<text x="${lw-6}" y="${24+r*rh+rh/2}" font-size="10" fill="${C.muted}" text-anchor="end">${d}</text>`).join('');

PAGES.knowledge=function(){
  const glossary=[
    {term:'ANPR (Automatic Number Plate Recognition)',insight:false,
      body:'Camera-based capture of vehicle licence plates at site entries. edyfi uses ANPR to estimate visitor counts, dwell time, return frequency, and origin region (via plate code prefixes). Plate data is processed to derive metrics; raw plates are not retained.',
      related:'Catchment · Short-stop · Visitor share'},
    {term:'Catchment',insight:false,
      body:'The geographic area from which a property draws visitors. Derived from ANPR plate codes (e.g. "Z" = Zwickau region). Used to estimate Scope 3 customer-travel emissions and to plan retail strategy.',
      related:'ANPR · Scope 3 · Visitor share'},
    {term:'Edyfi Insight',insight:true,
      body:'A metric or finding produced by combining two or more data sources in a way that\'s only possible because edyfi has both. Examples: energy-per-visitor (energy + ANPR), customer-travel Scope 3 (catchment + emissions factors), off-hours waste detector (consumption + opening hours).',
      related:'Fusion metrics · Catchment · M&V'},
    {term:'M&V (Measurement & Verification)',insight:false,
      body:'IPMVP-aligned methodology for proving energy and emissions savings from interventions. edyfi compares post-intervention performance against a counterfactual baseline that accounts for weather, occupancy, and other adjustments. Savings only enter the Verified Savings Ledger after successful M&V.',
      related:'Verified Savings Ledger · IPMVP'},
    {term:'PAI (Principal Adverse Impacts)',insight:false,
      body:'18 sustainability indicators required by SFDR Article 4. 14 are mandatory, 4 optional. edyfi tracks PAI completion across all properties and flags missing data ahead of filing deadlines.',
      related:'SFDR · ESG Compliance dashboard'},
    {term:'Short-stop',insight:false,
      body:'A visit shorter than the configured threshold (default 5 minutes). Often represents loyalty-card check-ins or quick errands rather than full shopping visits. Reported separately from Visitor share to avoid distorting retail metrics. Threshold is configurable per property.',
      related:'ANPR · Dwell time · Visitor share'},
    {term:'Visitor share',insight:false,
      body:'Percentage of passing traffic (vehicles or pedestrians passing the property) that converts into a visit. Higher values indicate stronger pull from the catchment.',
      related:'ANPR · Catchment · Short-stop'},
  ];

  const glossaryDE={
    'ANPR (Automatic Number Plate Recognition)':'Kamerabasierte Erfassung von Fahrzeugkennzeichen an den Standortzufahrten. edyfi nutzt ANPR, um Besucherzahlen, Verweildauer, Wiederkehrhäufigkeit und Herkunftsregion (über Kennzeichen-Präfixe) zu schätzen. Aus den Kennzeichendaten werden Kennzahlen abgeleitet; Rohkennzeichen werden nicht gespeichert.',
    'Catchment':'Das geografische Gebiet, aus dem eine Immobilie Besucher anzieht. Abgeleitet aus ANPR-Kennzeichencodes (z. B. „Z“ = Region Zwickau). Wird zur Schätzung der Scope-3-Kundenanreise-Emissionen und zur Retail-Strategieplanung genutzt.',
    'Edyfi Insight':'Eine Kennzahl oder Erkenntnis, die durch Kombination von zwei oder mehr Datenquellen entsteht und nur möglich ist, weil edyfi beide besitzt. Beispiele: Energie pro Besucher (Energie + ANPR), Kundenanreise-Scope-3 (Einzugsgebiet + Emissionsfaktoren), Außerbetrieb-Verschwendungsdetektor (Verbrauch + Öffnungszeiten).',
    'M&V (Measurement & Verification)':'IPMVP-konforme Methodik zum Nachweis von Energie- und Emissionseinsparungen aus Maßnahmen. edyfi vergleicht die Performance nach der Maßnahme mit einer kontrafaktischen Baseline, die Wetter, Belegung und weitere Anpassungen berücksichtigt. Einsparungen gelangen erst nach erfolgreicher M&V in das Verified-Savings-Ledger.',
    'PAI (Principal Adverse Impacts)':'18 Nachhaltigkeitsindikatoren, die von SFDR Artikel 4 gefordert werden. 14 sind verpflichtend, 4 optional. edyfi verfolgt die PAI-Vollständigkeit über alle Immobilien und kennzeichnet fehlende Daten vor den Einreichungsfristen.',
    'Short-stop':'Ein Besuch kürzer als der konfigurierte Schwellenwert (Standard 5 Minuten). Steht oft für Kundenkarten-Check-ins oder kurze Besorgungen statt vollständiger Einkäufe. Wird getrennt vom Besucheranteil ausgewiesen, um Retail-Kennzahlen nicht zu verzerren. Schwellenwert je Immobilie konfigurierbar.',
    'Visitor share':'Prozentsatz des vorbeikommenden Verkehrs (Fahrzeuge oder Fußgänger an der Immobilie), der zu einem Besuch wird. Höhere Werte zeigen eine stärkere Anziehungskraft aus dem Einzugsgebiet.'
  };

  return {title:'Knowledge Base',crumb:'Organisation',html:`

            ${[['📘','Getting Started','Setup guide for new properties and sensors'],

               ['🔌','Sensor & connection integration','Fludia, Shelly, PV inverters, EV chargers, BMS bridges'],
               ['🌡️','Heat Loss Model','Thermodynamic model documentation']].map(x=>`

          </div>
        </section>

        <section id="kb-conn" class="kb-section">
          <h2>Connections & methodologies</h2>
          <p class="kb-intro">How edyfi collects, processes, and derives the data shown on your dashboards.</p>

          <div class="kb-entry">
            <h3>Catchment model <span class="kb-pill">Edyfi Insight</span></h3>
            <p>How ANPR data is transformed into Scope 3 customer-travel emissions:</p>
            <ol>
              <li>Plates are detected at site entry/exit (or pass-by) and matched to German plate code regions.</li>
              <li>Each visit is paired with a probable origin region.</li>
              <li>Travel distance is modelled using road-network distances from region centroids.</li>
              <li>Modal share (car / walk / public transport / bike) is estimated from regional Eurostat data weighted by catchment.</li>
              <li>Distance × modal share × emission factors per km = customer-travel Scope 3.</li>
            </ol>
            <div class="kb-related">Feeds: Carbon Tracker · ESG Compliance Scope 3</div>
          </div>

          <div class="kb-entry">
            <h3>M&V verified savings <span class="kb-pill">Edyfi Insight</span></h3>
            <p>When an intervention (e.g. LED retrofit, HVAC controls) is logged, edyfi establishes a counterfactual baseline using pre-intervention data, normalises for weather and occupancy, and compares against measured post-intervention performance. Verification typically requires 3 months of post-intervention data. Savings that pass verification enter the Verified Savings Ledger — a public-facing M&V record auditable per property. Aligned with IPMVP Option C.</p>
          </div>

          <div class="kb-entry">
            <h3>Off-hours waste detector <span class="kb-pill">Edyfi Insight</span></h3>
            <p>Compares energy consumption during configured "closed" hours (per property) against typical daytime consumption. Properties with "leaking" off-hours load are flagged. Categories: Critical (≥60% of daytime leaking), High (40–59%), Moderate (20–39%), Low (under 20%).</p>
          </div>

          <div class="kb-entry">
            <h3>Energy-per-visitor outliers <span class="kb-pill">Edyfi Insight</span></h3>
            <p>For each property, total energy ÷ total visitors = energy intensity per visit (Wh/visit). Properties are normalised against the portfolio median. Severity: Critical (≥80% above median), High (40–80%), Moderate (±40%), Good (below median).</p>
          </div>
        </section>

        <section id="kb-reg" class="kb-section">
          <h2>Regulations</h2>
          <p class="kb-intro">Sustainability disclosure frameworks edyfi helps you comply with.</p>

          <div class="kb-entry">
            <h3>SFDR (Sustainable Finance Disclosure Regulation)</h3>
            <p>EU regulation applying to financial market participants. Article 4 requires disclosure of Principal Adverse Impacts (PAIs). edyfi tracks all 18 PAI indicators across your portfolio and exports filing-ready summaries (PDF disclosure + XLSX PAI statement).</p>
          </div>

          <div class="kb-entry">
            <h3>CSRD / ESRS (Corporate Sustainability Reporting Directive)</h3>
            <p>EU corporate reporting regime requiring detailed sustainability disclosures. ESRS standards cover Environment (E1–E5), Social (S1–S4), and Governance (G1). edyfi supports double-materiality assessment and ESRS-aligned data export.</p>
          </div>

          <div class="kb-entry">
            <h3>EU Taxonomy</h3>
            <p>Classification system for economically sustainable activities. edyfi reports your alignment percentage for building-related activities (acquisition, ownership, renovation).</p>
          </div>

          <div class="kb-entry">
            <h3>SBTi (Science-Based Targets initiative)</h3>
            <p>Independent body validating corporate emission reduction targets against climate science. The dashed green line on the Net Zero pathway chart represents an SBTi-aligned reduction trajectory.</p>
          </div>
        </section>

        <section id="kb-gdpr" class="kb-section">
          <h2>Data protection &amp; GDPR</h2>
          <p class="kb-intro">How edyfi handles personal data from ANPR licence plates and footfall sensors.</p>
          <div class="kb-entry">
            <h3>Is licence-plate (ANPR) and footfall data personal data?</h3>
            <p>Yes. Under the GDPR a licence plate can identify an individual, so ANPR and footfall data are treated as personal data. edyfi processes plates only to derive counts, dwell time, return frequency and origin region; raw plate images are not retained, and the dashboards show aggregated metrics rather than individual records.</p>
          </div>
          <div class="kb-entry">
            <h3>What is the lawful basis, and how long is data kept?</h3>
            <p>Processing relies on the legitimate interests of the site operator (visitor analytics and security), supported by a balancing test and entrance signage. Raw detections are minimised and deleted after the metrics are derived; only the aggregated figures are retained, under the operator's retention policy. A data-processing agreement (DPA) is in place between edyfi and the operator.</p>
          </div>
          <div class="kb-entry">
            <h3>Who is the controller, and how do visitors exercise their rights?</h3>
            <p>The property or store operator is the data controller; edyfi acts as processor under the DPA. Information notices at site entrances tell visitors what is collected and how to exercise access, objection or erasure rights, which are handled through the controller.</p>
          </div>
        </section>

        <section id="kb-faq" class="kb-section">
          <h2>Frequently asked questions</h2>

          <div class="kb-entry">
            <h3>Why does my dashboard show "sample data"?</h3>
            <p>During onboarding, before your first data sync completes, edyfi displays representative sample data so you can see how the platform works. Sample data is clearly labelled and is replaced automatically once real data starts flowing (usually within 24 hours of connection setup).</p>
          </div>

          <div class="kb-entry">
            <h3>How often is data updated?</h3>
            <p>Smart meters: half-hourly. ANPR and footfall: real-time. PV inverters: 5-minute intervals. REM (property records): every 4 hours. Weather and grid emission factors: daily.</p>
          </div>

          <div class="kb-entry">
            <h3>What happens to my data when a property is sold?</h3>
            <p>If the new owner signs with edyfi within 30 days, the data transfers with the property — including baseline year and historical reductions. If they don't sign, the data is anonymised and contributed to edyfi's aggregate dataset (for forecasting, AI training, and industry reports). You can opt out of the aggregate retention at sale time.</p>
            <div class="kb-related"><a href="#" onclick="Intake.openTransfer();return false">→ Open property transfer wizard</a></div>
          </div>

          <div class="kb-entry">
            <h3>Who at edyfi can see my data?</h3>
            <p>Only edyfi support and engineering staff with explicit authorisation, and only when troubleshooting an issue you've raised. Every staff access is logged in the Access audit (Settings → Users). Authorisations are time-limited and require manager approval.</p>
          </div>
        </section>
      </main>
    </div>
  `, init:()=>{
    // TOC active state on scroll
    const links=document.querySelectorAll('.kb-toc-link');
    const sections=document.querySelectorAll('.kb-section');
    function onScroll(){
      let active=sections[0].id;
      sections.forEach(s=>{const r=s.getBoundingClientRect();if(r.top<140)active=s.id;});
      links.forEach(l=>l.classList.toggle('on',l.getAttribute('href')==='#'+active));
    }
    window.addEventListener('scroll',onScroll,{passive:true});
  }};
};
