/* fixed-position ⓘ tooltips so they escape overflow:hidden ancestors */
function positionInfoTip(i){
  const tip=i.querySelector('.info-tip'); if(!tip)return;
  const r=i.getBoundingClientRect(); const w=tip.offsetWidth||228;
  let cx=r.left+r.width/2; cx=Math.max(8+w/2,Math.min(cx,window.innerWidth-8-w/2));
  tip.style.left=cx+'px';
  if(r.top>120){ tip.style.top='auto'; tip.style.bottom=(window.innerHeight-r.top+8)+'px'; }
  else { tip.style.bottom='auto'; tip.style.top=(r.bottom+8)+'px'; }
}
document.addEventListener('mouseover',function(e){var i=e.target.closest&&e.target.closest('.info-i'); if(i)positionInfoTip(i);});
document.addEventListener('focusin',function(e){var i=e.target.closest&&e.target.closest('.info-i'); if(i)positionInfoTip(i);});
function toggleNav(force){var sb=document.getElementById('sidebar'),sc=document.getElementById('navScrim');if(!sb)return;var open=(typeof force==='boolean')?force:!sb.classList.contains('open');sb.classList.toggle('open',open);if(sc)sc.classList.toggle('show',open);}
function closeNav(){toggleNav(false);}
/* tap-to-toggle info tooltips (touch has no hover) */
document.addEventListener('click',function(e){var i=e.target.closest&&e.target.closest('.info-i');document.querySelectorAll('.info-i.tip-open').forEach(function(x){if(x!==i)x.classList.remove('tip-open');});if(i){e.stopPropagation();positionInfoTip(i);i.classList.toggle('tip-open');}});
window.addEventListener('scroll',function(){document.querySelectorAll('.info-i.tip-open').forEach(function(x){x.classList.remove('tip-open');});},{passive:true});
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});

function setView(v){
  document.getElementById('iv-client').classList.toggle('active',v==='client');
  document.getElementById('iv-reviewer').classList.toggle('active',v==='reviewer');
  document.getElementById('ivt-client').classList.toggle('on',v==='client');
  document.getElementById('ivt-rev').classList.toggle('on',v==='reviewer');
  if(v==='client')renderClient(); else renderReviewer();
}

/* ---------------- CLIENT ROUTER ---------------- */
let clientScreen='import'; // import | home | wizard | edit | transfer
let transferState={property:null,buyerSigned:null,optOut:false,step:1};
function renderClient(){
  const s=document.getElementById('iclient-stage');
  if(clientScreen==='import') s.innerHTML=screenImport();
  else if(clientScreen==='home') s.innerHTML=screenHome();
  else if(clientScreen==='wizard'){s.innerHTML=screenWizard();afterWizard();}
  else if(clientScreen==='edit'){s.innerHTML=screenEdit();}
  else if(clientScreen==='transfer'){s.innerHTML=screenTransfer();}
  window.scrollTo(0,0);
}
function goClient(scr){clientScreen=scr;renderClient();}

/* ---- bulk import: functional file read ---- */
function startBulk(){
  const w=document.getElementById('import-work');
  w.innerHTML=`
  <div class="card" style="margin-top:22px;padding:22px">
    <h3 style="font-size:16px;color:var(--navy);font-weight:700;margin-bottom:4px">Import a spreadsheet</h3>
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:16px">Upload .xlsx, .xls or .csv. One row per property. Don't worry about column names — you'll map them next.</p>
    <div class="dropzone" id="dz" onclick="document.getElementById('xls').click()">
      <div class="dz-ico">📥</div>
      <h4>Drop your spreadsheet here, or click to browse</h4>
      <p>or <a href="#" onclick="event.stopPropagation();loadSampleSheet();return false" style="color:var(--blue);font-weight:600">try it with a sample portfolio sheet</a></p>
    </div>
    <input type="file" id="xls" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(event)">
    <div id="map-area"></div>
  </div>`;
  const dz=document.getElementById('dz');
  ['dragover','dragenter'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add('drag')}));
  ['dragleave','drop'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove('drag')}));
  dz.addEventListener('drop',ev=>{if(ev.dataTransfer.files[0])parseSheet(ev.dataTransfer.files[0])});
  w.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function handleFile(e){if(e.target.files[0])parseSheet(e.target.files[0]);}

function loadSampleSheet(){
  // build a sample workbook in-memory with deliberately non-matching column names
  const rows=[
    ['Objekt','Anschrift','Nutzungsart','Fläche m2','Baujahr','Mieter','EPC','Strom MWh','Gas MWh'],
    ['Edeka Freiberg','Bahnhofstr. 4, Freiberg','Standalone',5200,2009,3,'D',188,55],
    ['Netto Gera','Heinrichstr. 22, Gera','FMZ',3800,2014,4,'C',142,0],
    ['Rewe Jena','Löbderstr. 8, Jena','Hybrid',4600,2006,5,'D',176,48],
    ['Kaufland Erfurt','Anger 1, Erfurt','Standalone',9100,2001,2,'E',312,88],
  ];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Portfolio');
  const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  parseSheet(new File([wbout],'sample_portfolio.xlsx'));
}
function parseSheet(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const headers=json[0]||[]; const rows=json.slice(1).filter(r=>r.some(c=>c!==''));
      showMapping(file.name,headers,rows);
    }catch(err){toast('Could not read that file — try a .xlsx or .csv');}
  };
  reader.readAsArrayBuffer(file);
}

/* ---- column mapping ---- */
const TARGET_FIELDS=[
  {k:'name',label:'Property name',req:true,syn:['objekt','property','name','standort']},
  {k:'addr',label:'Address',req:false,syn:['anschrift','address','adresse']},
  {k:'type',label:'Property type',req:false,syn:['nutzungsart','type','typ']},
  {k:'area',label:'Lettable area (m²)',req:true,syn:['fläche','flache','area','sqm','m2']},
  {k:'year',label:'Construction year',req:false,syn:['baujahr','year','jahr']},
  {k:'tenants',label:'Tenants',req:false,syn:['mieter','tenants','tenant']},
  {k:'epcClass',label:'EPC class',req:false,syn:['epc','energieklasse','class']},
  {k:'electricity',label:'Electricity (MWh)',req:false,syn:['strom','electricity','power']},
  {k:'gas',label:'Gas (MWh)',req:false,syn:['gas']},
];
function autoMatch(header){
  const h=(header||'').toString().toLowerCase().trim();
  for(const f of TARGET_FIELDS){if(f.syn.some(s=>h.includes(s)))return f.k;}
  return '';
}
let IMPORT_CTX={headers:[],rows:[],map:{}};
function showMapping(fname,headers,rows){
  IMPORT_CTX={headers,rows,map:{}};
  headers.forEach((h,i)=>{IMPORT_CTX.map[i]=autoMatch(h);});
  const opts=k=>TARGET_FIELDS.map(f=>`<option value="${f.k}" ${f.k===k?'selected':''}>${f.label}${f.req?' *':''}</option>`).join('');
  const matched=Object.values(IMPORT_CTX.map).filter(Boolean).length;
  const ma=document.getElementById('map-area');
  ma.innerHTML=`
    <div style="margin-top:20px;display:flex;align-items:center;gap:10px">
      <span class="tag t-ok">✓ ${fname}</span>
      <span style="font-size:12.5px;color:var(--muted)">${rows.length} properties found · ${matched}/${headers.length} columns auto-matched</span>
    </div>
    <h4 style="font-size:13px;color:var(--navy);font-weight:700;margin:18px 0 8px">Map your columns to edyfi fields</h4>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">We matched what we could. Check the rest — set anything you don't need to "Ignore".</p>
    <table><thead><tr><th>Your column</th><th>Sample value</th><th>edyfi field</th></tr></thead><tbody>
    ${headers.map((h,i)=>`<tr class="mapping-row">
      <td><b>${h||'(blank)'}</b></td>
      <td style="color:var(--muted);font-family:monospace;font-size:12px">${(rows[0]&&rows[0][i]!==undefined?rows[0][i]:'')||'—'}</td>
      <td><select class="map" onchange="IMPORT_CTX.map[${i}]=this.value">
        <option value="">— Ignore —</option>${opts(IMPORT_CTX.map[i])}
      </select></td></tr>`).join('')}
    </tbody></table>
    <div style="margin-top:18px;display:flex;justify-content:flex-end;gap:10px">
      <button class="btn ghost" onclick="startBulk()">Cancel</button>
      <button class="btn" onclick="validateImport()">Preview &amp; validate →</button>
    </div>`;
  ma.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ---- validation preview ---- */
function validateImport(){
  const {headers,rows,map}=IMPORT_CTX;
  const fieldCol={}; Object.entries(map).forEach(([i,k])=>{if(k)fieldCol[k]=i;});
  if(fieldCol.name===undefined||fieldCol.area===undefined){toast('Please map at least Property name and Lettable area');return;}
  const records=rows.map(r=>{
    const rec={}; Object.entries(fieldCol).forEach(([k,i])=>rec[k]=r[i]);
    const issues=[];
    if(!rec.name)issues.push('Missing name');
    const area=parseFloat(rec.area);
    if(!area||isNaN(area))issues.push('Invalid area');
    const elec=parseFloat(rec.electricity);
    if(elec&&area&&(elec*1000/area)>60)issues.push('Electricity looks high vs area');
    if(!rec.epcClass)issues.push('No EPC — needed for PAI 18');
    let level='ok';
    if(issues.some(x=>/Missing name|Invalid area/.test(x)))level='bad';
    else if(issues.length)level='warn';
    return {rec,issues,level};
  });
  const ok=records.filter(r=>r.level==='ok').length;
  const warn=records.filter(r=>r.level==='warn').length;
  const bad=records.filter(r=>r.level==='bad').length;
  const dot=l=>`<span class="cellflag" style="background:${l==='ok'?C.green:l==='warn'?C.amber:C.red}"></span>`;
  document.getElementById('map-area').innerHTML=`
    <div style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap">
      <span class="tag t-ok">${ok} ready</span>
      <span class="tag t-warn">${warn} with warnings</span>
      ${bad?`<span class="tag t-bad">${bad} blocked</span>`:''}
    </div>
    <h4 style="font-size:13px;color:var(--navy);font-weight:700;margin:18px 0 8px">Review before import</h4>
    <table><thead><tr><th></th><th>Property</th><th>Area</th><th>EPC</th><th>Elec MWh</th><th>Notes</th></tr></thead><tbody>
    ${records.map(r=>`<tr>
      <td>${dot(r.level)}</td>
      <td><b>${r.rec.name||'—'}</b></td>
      <td>${r.rec.area||'—'}</td>
      <td>${r.rec.epcClass||'<span style="color:var(--red)">—</span>'}</td>
      <td>${r.rec.electricity||'—'}</td>
      <td style="font-size:11.5px;color:var(--muted)">${r.issues.join(' · ')||'<span style="color:var(--green)">Looks good</span>'}</td>
    </tr>`).join('')}
    </tbody></table>
    ${warn||bad?`<div class="note"><b>Rows with warnings still import</b> — they're added to your portfolio and flagged for edyfi review, so nothing blocks your progress. Blocked rows need a name and a valid area first.</div>`:''}
    <div style="margin-top:18px;display:flex;justify-content:flex-end;gap:10px">
      <button class="btn ghost" onclick="validateImport.back&&0;showMapping(IMPORT_CTX._fname||'your file',IMPORT_CTX.headers,IMPORT_CTX.rows)">← Back to mapping</button>
      <button class="btn green" onclick="commitImport(${ok+warn})">Import ${ok+warn} properties →</button>
    </div>`;
  document.getElementById('map-area').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function commitImport(n){
  STATE.imported=true;
  toast(`${n} properties imported into your portfolio`);
  goClient('home');

const STEPS=[

  {k:'energy',n:'Energy',sub:'Consumption & bills'},

function screenWizard(){

function afterWizard(){renderStep();}
function gotoStep(i){STATE.wizardStep=i;renderStep();
  document.querySelectorAll('.step').forEach((el,idx)=>{el.classList.toggle('on',idx===i);});}
function renderStep(){
  const k=STEPS[STATE.wizardStep].k;
  const fn={setup:stepSetup,basics:stepBasics,energy:stepEnergy,pai:stepPAI,review:stepReview}[k];
  document.getElementById('wpanel').innerHTML=fn();
  // refresh step states
  const wiz=document.getElementById('iclient-stage');
  wiz.querySelectorAll('.step').forEach((el,idx)=>{
    el.classList.toggle('on',idx===STATE.wizardStep);
    el.classList.toggle('done',idx<STATE.wizardStep);
    el.querySelector('.sn').textContent=idx<STATE.wizardStep?'✓':idx+1;
  });
}
function wnav(back,next,nextLabel){
  return `<div class="wp-f">
    <button class="btn ghost" ${back?`onclick="gotoStep(${STATE.wizardStep-1})"`:'disabled'}>← Back</button>

function acceptExtract(){
  document.getElementById('f-elec').value='284';
  document.getElementById('f-ren').value='38';

function saveEnergy(){
  const p=prop(STATE.activeProperty);
  p.data.electricity=document.getElementById('f-elec').value;
  p.data.gas=document.getElementById('f-gas').value;
  p.data.renewableShare=document.getElementById('f-ren').value;

}

function submitProperty(){
  const p=prop(STATE.activeProperty);
  p.status='submitted'; p.completeness=Math.max(p.completeness,90);
  toast(`${p.name} submitted to edyfi for verification`);
  goClient('home');
}
function bumpCompleteness(p,to){if(p.completeness<to)p.completeness=to;if(p.status==='skeleton')p.status='editing';}

let queueFilter='all';
function renderReviewer(){
  const s=document.getElementById('ireviewer-stage');
  const counts={
    all:STATE.properties.length,
    review:STATE.properties.filter(p=>p.status==='review').length,
    submitted:STATE.properties.filter(p=>p.status==='submitted').length,
    verified:STATE.properties.filter(p=>p.status==='verified').length,
    flagged:STATE.properties.filter(p=>p.status==='flagged').length,
  };
  let list=STATE.properties.filter(p=>p.status!=='skeleton'&&p.status!=='editing');
  if(queueFilter!=='all')list=STATE.properties.filter(p=>p.status===queueFilter);
  const tab=(k,lab)=>`<button class="${queueFilter===k?'on':''}" onclick="queueFilter='${k}';renderReviewer()">${lab} ${counts[k]!==undefined?`(${counts[k]})`:''}</button>`;
  s.innerHTML=`
  <h2 class="title">Review queue</h2>
  <p class="lead">Client submissions awaiting edyfi verification. Assisted-tier clients and low-confidence extractions are prioritised. This is where data quality is checked before it's locked into the platform.</p>

  <div class="summary-row" style="grid-template-columns:repeat(4,1fr)">
    <div class="sumcard"><div class="l">Awaiting review</div><div class="v">${counts.submitted+counts.review}</div></div>
    <div class="sumcard"><div class="l">Assisted clients</div><div class="v">${STATE.properties.filter(p=>p.assisted).length}</div></div>
    <div class="sumcard"><div class="l">Verified</div><div class="v">${counts.verified}</div></div>
    <div class="sumcard"><div class="l">Flagged back</div><div class="v">${counts.flagged}</div></div>
  </div>

  <div class="queue-tabs">${tab('all','All')}${tab('submitted','Submitted')}${tab('review','Under review')}${tab('flagged','Flagged')}${tab('verified','Verified')}</div>

  <div class="card" style="overflow:hidden">
    <table><thead><tr><th>Property</th><th>Tier</th><th>Completeness</th><th>Flags</th><th>Status</th><th></th></tr></thead><tbody>
    ${list.length?list.map(p=>{
      const m=STATUS_META[p.status];
      const flags=reviewFlags(p);
      return `<tr>
        <td><div style="display:flex;align-items:center;gap:10px"><span class="avatar" style="background:${p.assisted?C.purple:C.sky}">${p.name.slice(0,2).toUpperCase()}</span>
          <div><b>${p.name}</b><div style="font-size:11.5px;color:var(--muted)">${p.addr}</div></div></div></td>
        <td>${p.assisted?'<span class="tag t-info">Assisted</span>':'<span class="tag t-skeleton">Self-serve</span>'}</td>
        <td style="min-width:120px"><div class="completeness"><div class="cbar"><i style="width:${p.completeness}%"></i></div><span style="font-size:12px;font-weight:700">${p.completeness}%</span></div></td>
        <td>${flags.length?flags.map(f=>`<span class="tag t-warn" style="font-size:9px;margin:1px">${f}</span>`).join(''):'<span class="tag t-ok" style="font-size:9px">Clean</span>'}</td>
        <td><span class="tag ${m.cls}">${m.label}</span></td>
        <td><button class="btn ghost" style="padding:7px 12px;font-size:12px" onclick="openReview('${p.id}')">Open</button></td>
      </tr>`;}).join(''):'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">Nothing in this queue.</td></tr>'}
    </tbody></table>
  </div>
  <div class="demo-note"><b>Demo note:</b> the reviewer cockpit is edyfi's internal worklist. <b>In production</b> it's driven by the same status model the client sees — every "Submit" lands here, every "Verify" flows back to the client and locks the data for reporting.</div>`;
}
function reviewFlags(p){
  const f=[];
  if(!p.data.gas&&p.data.gas!=='0')f.push('No gas data');
  if(!p.data.epcClass)f.push('No EPC');
  if(!p.data.fossilExposure)f.push('PAI 17 blank');
  const elec=parseFloat(p.data.electricity);
  if(elec&&p.area&&(elec*1000/p.area)>40)f.push('High intensity');
  return f;
}
function openReview(id){
  const p=prop(id);const d=p.data;const flags=reviewFlags(p);
  document.getElementById('imodal-title').textContent='Review · '+p.name;
  document.getElementById('imodal-body').innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${p.assisted?'<span class="tag t-info">Assisted tier</span>':'<span class="tag t-skeleton">Self-serve</span>'}
      <span class="tag ${STATUS_META[p.status].cls}">${STATUS_META[p.status].label}</span>
      <span class="tag t-progress">${p.completeness}% complete</span>
    </div>
    <h4 style="font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px">Client inputs &amp; evidence</h4>
    <table style="border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:14px">
      <tbody>
      <tr><td>Electricity</td><td><b>${d.electricity||'—'} MWh</b></td><td>${d.electricity?'<span class="tag t-ok" style="font-size:9px">📎 bill</span>':''}</td></tr>
      <tr><td>Gas</td><td><b>${d.gas||'—'} MWh</b></td><td></td></tr>
      <tr><td>EPC class</td><td><b>${d.epcClass||'—'}</b></td><td>${d.epcClass?'<span class="tag t-ok" style="font-size:9px">📎 Energieausweis</span>':''}</td></tr>
      <tr><td>Primary energy</td><td><b>${d.primaryEnergy||'—'} kWh/m²·a</b></td><td></td></tr>
      <tr><td>Energy carrier</td><td><b>${d.energyCarrier||'—'}</b></td><td></td></tr>
      <tr><td>Fossil exposure (PAI 17)</td><td><b>${d.fossilExposure||'—'}</b></td><td></td></tr>
      </tbody></table>
    ${flags.length?`<div class="note" style="margin-top:0"><b>Validation flags:</b> ${flags.join(' · ')}. ${p.assisted?'As an assisted client, edyfi resolves these directly.':'Query back to the client to resolve.'}</div>`:'<div class="note" style="margin-top:0;border-color:var(--green);background:linear-gradient(90deg,rgba(3,97,71,.06),transparent)"><b>No validation flags.</b> Inputs are within expected ranges and evidence is attached.</div>'}
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn ghost" style="flex:1;justify-content:center" onclick="queryBack('${id}')">↩ Query back to client</button>
      <button class="btn green" style="flex:1;justify-content:center" onclick="verifyProp('${id}')">✓ Verify &amp; lock</button>
    </div>`;
  document.getElementById('imodal').classList.add('show');
}
function verifyProp(id){const p=prop(id);p.status='verified';p.completeness=100;closeModal();renderReviewer();toast(`${p.name} verified & locked`);}
function queryBack(id){const p=prop(id);p.status='flagged';closeModal();renderReviewer();toast(`Query sent to client for ${p.name}`);}

  return {
    open: function(startScreen){
      document.getElementById("intake-wm").src=WM_SRC;
      // default opening screen: home if portfolio already populated, import otherwise
      if(startScreen){clientScreen=startScreen;}
      document.getElementById("intake-root").classList.add("open");
      document.body.style.overflow="hidden";
      renderClient();
    },
    openReviewer: function(){
      document.getElementById("intake-wm").src=WM_SRC;
      document.getElementById("intake-root").classList.add("open");
      document.body.style.overflow="hidden";
      setView("reviewer");
    },
    openProperty: function(id){
      document.getElementById("intake-wm").src=WM_SRC;
      document.getElementById("intake-root").classList.add("open");
      document.body.style.overflow="hidden";
      setView("client");
      openProperty(id);
    },
    openTransfer: function(propertyData){
      document.getElementById("intake-wm").src=WM_SRC;
      document.getElementById("intake-root").classList.add("open");
      document.body.style.overflow="hidden";
      transferState={property:propertyData||null,buyerSigned:null,optOut:false,step:1};
      clientScreen='transfer';
      setView("client");
    },
    setFramework: function(fw){
      STATE.framework=fw;
      document.getElementById("fw-sfdr").classList.toggle("on",fw==="sfdr");
      document.getElementById("fw-csrd").classList.toggle("on",fw==="csrd");
      document.getElementById("intake-ctx-label").textContent = fw==="csrd" ? "CSRD / ESRS Reporting" : "SFDR Reporting";
      // re-render whichever side is active
      const isReviewer=document.getElementById("iv-reviewer").classList.contains("active");
      if(isReviewer)renderReviewer(); else renderClient();
    },
    transferSet: function(key,val){
      transferState[key]=val;
      renderClient();
    },
    transferConfirm: function(){
      const t=transferState;
      const msg = t.buyerSigned
        ? 'Transfer initiated — buyer notified, baseline preserved'
        : (t.optOut
          ? 'Property data marked for deletion after 30-day grace period'
          : 'Property data will be anonymised and contributed to aggregate dataset');
      toast(msg);
      goClient('home');
    },
    close: function(){
      document.getElementById("intake-root").classList.remove("open");
      document.body.style.overflow="";
    },
    setView: setView,
    openHelp: openHelp,
    closeModal: closeModal,
    completenessOverall: function(){return overallCompleteness();},
    state: STATE
  };
